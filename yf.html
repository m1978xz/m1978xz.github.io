.container { display: flex; height: 100vh; }

.editor-panel .header .dot.r { background: #ff5f56; }
.editor-panel .header .dot.y { background: #ffbd2e; }
.editor-panel .header .dot.g { background: #27c93f; }
.editor-panel .header span { margin-left: auto; font-size: 12px; color: #666; }
textarea {
  flex: 1; width: 100%; resize: none; border: none; outline: none; padding: 20px;

}

.preview-panel {
  flex: 1; display: flex; flex-direction: column; background: #0a0a0a; min-width: 0; overflow: hidden;
}
.preview-panel .header {
  padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #333;
  font-size: 13px; color: #888; display: flex; align-items: center;
}
.preview-panel .header .badge {
  margin-left: auto; background: #2d2d2d; padding: 2px 10px; border-radius: 4px; font-size: 11px; color: #999;
}
.preview-content {
  flex: 1; padding: 30px 40px; overflow-y: auto; line-height: 1.8;
}

/* Markdown 渲染样式 */
.preview-content h1 { font-size: 26px; border-bottom: 1px solid #333; padding-bottom: 10px; margin: 30px 0 16px; color: #f0f0f0; }
.preview-content h2 { font-size: 22px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; margin: 26px 0 14px; color: #e8e8e8; }
.preview-content h3 { font-size: 18px; margin: 22px 0 12px; color: #e0e0e0; }
.preview-content p { margin: 10px 0; }
.preview-content a { color: #60b8ff; text-decoration: none; }
.preview-content a:hover { text-decoration: underline; }
.preview-content strong { color: #fff; }
.preview-content blockquote {
  border-left: 4px solid #60b8ff; padding: 8px 16px; margin: 12px 0;
  background: #141414; color: #bbb; border-radius: 0 6px 6px 0;
}
.preview-content code {
  background: #1e1e1e; padding: 2px 7px; border-radius: 4px; font-size: 13px; color: #c9d1d9;
}
.preview-content pre {
  background: #121212; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 14px 0; border: 1px solid #222;
}
.preview-content pre code { background: none; padding: 0; }
.preview-content table {
  border-collapse: collapse; width: 100%; margin: 14px 0;
}
.preview-content th, .preview-content td {
  border: 1px solid #333; padding: 10px 14px; text-align: left;
}
.preview-content th { background: #1a1a1a; color: #ccc; font-weight: 600; }
.preview-content td { background: #0f0f0f; }
.preview-content ul, .preview-content ol { padding-left: 24px; margin: 8px 0; }
.preview-content li { margin: 4px 0; }
.preview-content hr { border: none; border-top: 1px solid #333; margin: 24px 0; }
.preview-content img { max-width: 100%; border-radius: 6px; }

/* 滚动条 */
.preview-content::-webkit-scrollbar { width: 6px; }
.preview-content::-webkit-scrollbar-track { background: transparent; }
.preview-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

@media (max-width: 768px) {
  .container { flex-direction: column; }
  .editor-panel { border-right: none; border-bottom: 1px solid #333; height: 50vh; }
  .preview-panel { height: 50vh; }
  .preview-content { padding: 20px; }
}
</style>

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

editor.value = mdContent;

function render() {
  preview.innerHTML = marked.parse(editor.value);
  preview.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (!href || href === '#') { e.preventDefault(); return; }
      if (href.startsWith('#')) {
        e.preventDefault();
        const target = document.getElementById(href.slice(1));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
}

editor.addEventListener('input', render);
render();
</script>
